<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mạnh Cường Store - Chi Tiết Sản Phẩm</title>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Mạnh Cường Store</h1>
        <p style="margin-top: 10px; font-size: 16px; opacity: 0.9; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.15);">Thiên đường mua sắm công nghệ & phụ kiện cao cấp</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Trang Chủ</a></li>
            <li><a href="products.html">Sản Phẩm</a></li>
            <li><a href="contact.html">Liên Hệ</a></li>
            <li><a href="admin.html">Quản Lý</a></li>
            <li><button id="themeToggle" class="theme-toggle-btn" title="Chuyển chế độ Sáng/Tối">🌙</button></li>
        </ul>
    </nav>

    <div class="detail-container">
        <div class="detail-image">
            <img id="productImage" src="" alt="Sản phẩm">
        </div>

        <div class="detail-info">
            <h1 id="productName"></h1>
            <p class="price" id="productPrice"></p>
            <p class="description" id="productDescription"></p>

            <div class="quantity-selector">
                <label for="quantity">Số lượng:</label>
                <input type="number" id="quantity" min="1" value="1">
            </div>

            <div class="action-buttons">
                <button class="btn-buy">🛒 Mua Ngay</button>
                <a href="index.html" class="btn-back">← Tiếp Tục Mua Sắm</a>
            </div>
        </div>
    </div>

    <script src="product-detail.js"></script>
</body>

</html>
